paths:
  raw_data: data/raw
  processed_data: data/processed
  outputs: data/outputs

embedding_model: all-MiniLM-L6-v2

analysis:
  min_turn_length: 10          # Ignore very short turns (chars)
  top_n_terms: 30              # For TF-IDF distinctive words
  topic_model_min_topic_size: 5
  max_conversations: null      # null = all, or set an int to limit

llm_judge:
  model: claude-sonnet-4-5-20250929
  sample_size: 200              # Per source
  min_turn_length: 50           # Skip very short responses (words)
  max_concurrent: 5             # Rate limiting
  cache_file: data/processed/llm_judge_cache.json

viz:
  style: seaborn-v0_8-whitegrid
  figsize: [12, 7]
  dpi: 150
  palette: ["#6366f1", "#f59e0b", "#10b981"]  # Claude=indigo, Gemini=amber, ChatGPT=green
